<!DOCTYPE html>
<html>
<head>
    <title>Test Upload</title>
</head>
<body>
    <h2>Login first</h2>
    <button onclick="login()">Login</button>
    <div id="result"></div>
    
    <script>
        let token = '';
        
        async function login() {
            const response = await fetch('http://localhost:5000/api/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email: 'newuser@example.com', password: '123456'})
            });
            const data = await response.json();
            token = data.token;
            document.getElementById('result').innerHTML = `
                <h3>✅ Logged in!</h3>
                <p>Token: ${token.substring(0, 50)}...</p>
                <h2>Create Folder</h2>
                <input type="text" id="folderName" placeholder="Folder name">
                <button onclick="createFolder()">Create Folder</button>
                <div id="folderResult"></div>
                <h2>Upload Image</h2>
                <input type="file" id="imageFile" accept="image/*">
                <input type="text" id="imageName" placeholder="Image name">
                <button onclick="uploadImage()">Upload</button>
                <div id="uploadResult"></div>
            `;
        }
        
        async function createFolder() {
            const name = document.getElementById('folderName').value;
            const response = await fetch('http://localhost:5000/api/folders', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-auth-token': token
                },
                body: JSON.stringify({name: name})
            });
            const data = await response.json();
            if(data.success) {
                document.getElementById('folderResult').innerHTML = `
                    ✅ Folder created! ID: ${data.folder.id}
                    <input type="hidden" id="folderId" value="${data.folder.id}">
                `;
            }
        }
        
        async function uploadImage() {
            const file = document.getElementById('imageFile').files[0];
            const name = document.getElementById('imageName').value;
            const folderId = document.getElementById('folderId').value;
            
            const formData = new FormData();
            formData.append('name', name || file.name);
            formData.append('folderId', folderId);
            formData.append('image', file);
            
            const response = await fetch('http://localhost:5000/api/images/upload', {
                method: 'POST',
                headers: {'x-auth-token': token},
                body: formData
            });
            const data = await response.json();
            if(data.success) {
                document.getElementById('uploadResult').innerHTML = `
                    ✅ Image uploaded!<br>
                    <img src="${data.image.url}" style="max-width: 200px">
                `;
            } else {
                document.getElementById('uploadResult').innerHTML = `❌ Failed: ${data.message}`;
            }
        }
    </script>
</body>
</html>
